---
name: Foo

on:
  workflow_dispatch:
  workflow_call:

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.get_version.outputs.new-version }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - id: get_version
        uses: ./.github/actions/version

      - name: Create release branch
        run: |
          git config --global user.name "Christian Kemper"
          git config --global user.email "christian.kemper@me.com"

          git checkout -b release/v${{ steps.get_version.outputs.new-version }}

      - name: Update Cargo.toml if required.
        run: |
          current_version=${{ steps.get_version.outputs.current-version }}
          new_version=${{ steps.get_version.outputs.new-version }}
          if [ "${current_version}" != "${new_version}" ]; then
            sed -i "s/^version = \".*\"/version = \"${new_version}\"/" Cargo.toml
            nix develop -L --command cargo update -p laio
            git add Cargo.toml Cargo.lock
            git commit -m "Bump version in Cargo.toml to ${new_version}"
            git push --force --set-upstream origin release/v${{ steps.get_version.outputs.new-version }}
          fi

      - name: run preliminary checks and tests
        if: ${{ ! env.ACT }}
        run: |
          nix flake show
          nix develop --command cargo test

  build:
    needs: prep
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-linux
          # - name: linux-arm64
          #   runner: ubuntu-latest
          #   target: aarch64-linux
          # - name: macos-amd64
          #   runner: macos-latest
          #   target: x86_64-darwin
          # - name: macos-arm64
          #   runner: macos-latest
          #   target: aarch64-darwin

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # with:
        #   fetch-depth: 0
        #   fetch-tags: true
        #   ref: ${{ github.ref }}
        #   token: ${{ secrets.GITHUB_TOKEN }}
      - name: setup git
        run: |
          git config --global user.name "Christian Kemper"
          git config --global user.email "christian.kemper@me.com"
          git checkout release/v${{ needs.prep.outputs.new-version }}

      - name: build
        id: build
        uses: ./.github/actions/build
        with:
          target: ${{ matrix.target }}
          name: laio
          version: ${{ needs.prep.outputs.new-version }}

      - name: update nix data catalog
        uses: ./.github/actions/package-data
        with:
          binary: ${{ steps.build.outputs.binary }}
          nix-hash: ${{ steps.build.outputs.nix-hash }}
          target: ${{ matrix.target }}
          url_prefix: https://github.com/ck3mp3r/laio-cli/releases/download
          version: ${{ needs.prep.outputs.new-version }}

      - name: print shas
        run: |
          echo "${{ steps.build.outputs.nix-hash }}"
          echo "${{ steps.build.outputs.sha-256 }}"

      # - run: nix flake check --impure
