---
name: Foo

on:
  workflow_dispatch:
  workflow_call:

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_next_version.outputs.version }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - id: get_next_version
        uses: ./.github/actions/version

      - name: run preliminary checks and tests
        if: ${{ ! env.ACT }}
        run: |
          nix flake show
          nix develop --command cargo test

  build:
    needs: prep
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-linux
          # - name: linux-arm64
          #   runner: ubuntu-latest
          #   target: aarch64-linux
          # - name: macos-amd64
          #   runner: macos-latest
          #   target: x86_64-darwin
          # - name: macos-arm64
          #   runner: macos-latest
          #   target: aarch64-darwin

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # with:
        #   fetch-depth: 0
        #   fetch-tags: true
        #   ref: ${{ github.ref }}
        #   token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        id: build
        uses: ./.github/actions/build
        with:
          target: ${{ matrix.target }}
          name: laio
          version: ${{ needs.prep.outputs.version }}

      - name: update nix data catalog
        uses: ./.github/actions/package-data/
        with:
          target: ${{ matrix.target }}
          binary: ${{ steps.build.outputs.binary }}
          nix-sha: ${{ steps.build.outputs.nix-sha }}
          version: ${{ needs.prep.outputs.version }}
          url_prefix: https://github.com/ck3mp3r/laio-cli/releases/download
          git_user: Christian Kemper
          git_user_email: christian.kemper@me.com
          
      - name: print shas
        run: |
          echo "${{ steps.build.outputs.nix-hash }}"
          echo "${{ steps.build.outputs.sha-256 }}"

